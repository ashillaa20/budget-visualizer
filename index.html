<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="wrapper">

    <header>
      <h1>Expense & Budget Visualizer</h1>
    </header>

    <div class="balance-card">
      <p class="balance-label">Total Balance</p>
      <p class="balance-amount" id="balance">Rp 0</p>
    </div>

    <section class="card">
      <h2>Add Transaction</h2>
      <form id="transactionForm">
        <div class="form-row">
          <div class="field">
            <label for="itemName">Item</label>
            <input type="text" id="itemName" placeholder="e.g. Lunch" maxlength="100" autocomplete="off" />
            <span class="error" id="itemNameError"></span>
          </div>
          <div class="field">
            <label for="amount">Amount (Rp)</label>
            <input type="number" id="amount" placeholder="e.g. 50000" min="0.01" step="0.01" />
            <span class="error" id="amountError"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="category">Category</label>
            <select id="category">
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <span class="error" id="categoryError"></span>
          </div>
          <div class="field">
            <label for="txDate">Date</label>
            <input type="date" id="txDate" />
          </div>
        </div>
        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <section class="card">
      <h2>Manage Categories</h2>
      <div class="inline-field">
        <input type="text" id="newCategory" placeholder="New category name" maxlength="50" autocomplete="off" />
        <button id="addCategoryBtn" class="btn-secondary">Add</button>
      </div>
      <span class="error" id="categoryMgrError"></span>
    </section>

    <section class="card">
      <div class="controls">
        <div class="field">
          <label for="filterCategory">Filter by category</label>
          <select id="filterCategory">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="field">
          <label for="sortOption">Sort by</label>
          <select id="sortOption">
            <option value="default">Default</option>
            <option value="amount">Amount</option>
            <option value="category">Category</option>
            <option value="date">Date</option>
          </select>
        </div>
      </div>
    </section>

    <div class="data-grid">

      <section class="card">
        <h2>Transactions</h2>
        <div class="stats" id="stats" hidden>
          <span id="statCount"></span>
          <span id="statTotal"></span>
          <span id="statAvg"></span>
        </div>
        <div class="tx-list" id="txList" role="list"></div>
        <p class="empty" id="emptyMsg" hidden></p>
      </section>

      <section class="card">
        <h2>Spending by Category</h2>
        <div class="chart-box" id="chartBox">
          <canvas id="expenseChart"></canvas>
        </div>
        <p class="empty" id="chartEmpty" hidden>No data yet.</p>
      </section>

    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
